apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdm-qa-worker
  namespace: qualidade-automation-tdm-qa
  labels:
    app: tdm-qa
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tdm-qa
      component: worker
  template:
    metadata:
      labels:
        app: tdm-qa
        component: worker
    spec:
      serviceAccountName: automacaoqa
      containers:
        - name: worker
          image: image-registry.openshift-image-registry.svc:5000/qualidade-automation-tdm-qa/tdm-qa:latest
          imagePullPolicy: Always
          command: ["node", "server/worker.js"]
          envFrom:
            - configMapRef:
                name: tdm-qa-config
            - secretRef:
                name: tdm-qa-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
