# Template — NÃO aplicar com valores reais no Git.
# A Secret `tdm-qa-secrets` já deve existir no cluster (criada via oc create secret).
#
# Exemplo (PowerShell / CMD — uma linha por --from-literal):
#   oc create secret generic tdm-qa-secrets ^
#     --from-literal=MYSQL_PASSWORD=<senha> ^
#     --from-literal=REDIS_PASSWORD=<senha> ^
#     --from-literal=SESSION_SECRET=<segredo_forte> ^
#     --from-literal=SF_TI_CLIENT_ID=<id> ^
#     --from-literal=SF_TI_CLIENT_SECRET=<secret> ^
#     --from-literal=PEGA_TI_CLIENT_ID=<id> ^
#     --from-literal=PEGA_TI_CLIENT_SECRET=<secret> ^
#     --from-literal=SF_TRG_CLIENT_ID=<id> ^
#     --from-literal=SF_TRG_CLIENT_SECRET=<secret> ^
#     --from-literal=PEGA_TRG_CLIENT_ID=<id> ^
#     --from-literal=PEGA_TRG_CLIENT_SECRET=<secret> ^
#     -n qualidade-automation-tdm-qa
#
# Chaves opcionais (legado / override por ambiente ativo):
#   SF_CONSUMER_KEY, SF_CONSUMER_SECRET, PEGA_CLIENT_ID, PEGA_CLIENT_SECRET
#   SF_ACCESS_TOKEN, SF_USERNAME, SF_PASSWORD, SF_GRANT_TYPE, SF_COOKIE
#   PEGA_BEARER_TOKEN, PEGA_TOKEN_URL, PEGA_BASE_URL, PEGA_COOKIE
#
# OFS supervisor (UI dispatcher — fluxos Massa Completa até Ativação):
#   OFS_USERNAME, OFS_PASSWORD
#   (opcional) OFS_UI_ORGANIZATION, OFS_TECH_PID, OFS_TECH_SEARCH, OFS_BUCKET_PID
#
# Adicionar só OFS num secret já existente (CMD):
#   oc set data secret/tdm-qa-secrets ^
#     --from-literal=OFS_USERNAME=<usuario_supervisor> ^
#     --from-literal=OFS_PASSWORD=<senha_supervisor> ^
#     -n qualidade-automation-tdm-qa
#   oc rollout restart deployment/tdm-qa-api deployment/tdm-qa-worker -n qualidade-automation-tdm-qa
#
# Os Deployments injetam todas as chaves via envFrom (secretRef).
apiVersion: v1
kind: Secret
metadata:
  name: tdm-qa-secrets
  namespace: qualidade-automation-tdm-qa
  labels:
    app: tdm-qa
type: Opaque
stringData:
  MYSQL_PASSWORD: "<senha_mysql>"
  REDIS_PASSWORD: "<senha_redis>"
  SESSION_SECRET: "<segredo_forte_aleatorio>"
  SF_TI_CLIENT_ID: "<salesforce_ti_client_id>"
  SF_TI_CLIENT_SECRET: "<salesforce_ti_client_secret>"
  PEGA_TI_CLIENT_ID: "<pega_ti_client_id>"
  PEGA_TI_CLIENT_SECRET: "<pega_ti_client_secret>"
  SF_TRG_CLIENT_ID: "<salesforce_trg_client_id>"
  SF_TRG_CLIENT_SECRET: "<salesforce_trg_client_secret>"
  PEGA_TRG_CLIENT_ID: "<pega_trg_client_id>"
  PEGA_TRG_CLIENT_SECRET: "<pega_trg_client_secret>"
  OFS_USERNAME: "<usuario_supervisor_ofs>"
  OFS_PASSWORD: "<senha_supervisor_ofs>"
