# Template — NÃO aplicar com valores reais no Git.
# Prefira criar via CLI (recomendado):
#
#   oc create secret generic tdm-qa-secrets -n automation-tdm-qa \
#     --from-literal=MYSQL_PASSWORD='...' \
#     --from-literal=REDIS_PASSWORD='...' \
#     --from-literal=SESSION_SECRET='...' \
#     --from-literal=SF_CONSUMER_KEY='...' \
#     --from-literal=SF_CONSUMER_SECRET='...' \
#     --from-literal=PEGA_CLIENT_ID='...' \
#     --from-literal=PEGA_CLIENT_SECRET='...'
#
# Chaves opcionais (omitir se não usar):
#   SF_ACCESS_TOKEN, SF_USERNAME, SF_PASSWORD, SF_GRANT_TYPE, SF_COOKIE
#   PEGA_BEARER_TOKEN, PEGA_TOKEN_URL, PEGA_BASE_URL, PEGA_COOKIE
#
# Os Deployments injetam todas as chaves via envFrom (secretRef).
apiVersion: v1
kind: Secret
metadata:
  name: tdm-qa-secrets
  namespace: automation-tdm-qa
type: Opaque
stringData:
  # Infra
  MYSQL_PASSWORD: "alterar"
  REDIS_PASSWORD: "alterar"
  SESSION_SECRET: "alterar_segredo_forte_aleatorio"
  # Salesforce (scripts de massa)
  SF_CONSUMER_KEY: "alterar"
  SF_CONSUMER_SECRET: "alterar"
  # PEGA (scripts com config PEGA)
  PEGA_CLIENT_ID: "alterar"
  PEGA_CLIENT_SECRET: "alterar"
