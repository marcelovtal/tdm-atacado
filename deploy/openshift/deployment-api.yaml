apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdm-qa-api
  namespace: qualidade-automation-tdm-qa
  labels:
    app: tdm-qa
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tdm-qa
      component: api
  template:
    metadata:
      labels:
        app: tdm-qa
        component: api
    spec:
      serviceAccountName: automacaoqa
      containers:
        - name: api
          image: image-registry.openshift-image-registry.svc:5000/qualidade-automation-tdm-qa/tdm-qa:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3333
              name: http
          envFrom:
            - configMapRef:
                name: tdm-qa-config
            - secretRef:
                name: tdm-qa-secrets
          readinessProbe:
            tcpSocket:
              port: 3333
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3333
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: tdm-qa-api
  namespace: qualidade-automation-tdm-qa
  labels:
    app: tdm-qa
    component: api
spec:
  selector:
    app: tdm-qa
    component: api
  ports:
    - name: http
      port: 3333
      targetPort: 3333
